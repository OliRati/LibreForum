name: LibreForum

services:
  # PHP / Symfony
  php:
    env_file:
      - .env
    build:
      context: ./docker/php
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./backend:/var/www/html
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      - mysql

  # Nginx
  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - php
      - frontend

  # MySQL
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: libreforum
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - mysql

  # Mailhog
  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  # Frontend React + Vite (dev)
  frontend:
    env_file:
      - .env
    build:
      context: ./frontend
    working_dir: /app
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    stdin_open: true
    tty: true

  # Ollama (LLM local)
  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama

  # API Python (LLM)
  llm:
    env_file:
      - .env
    build:
      context: ./llm
    volumes:
      - ./llm:/app
    depends_on:
      - ollama
    ports:
      - "8000:8000"

  mercure:
    image: dunglas/mercure
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:80"
    environment:
      SERVER_NAME: ':80'
      MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_JWT_SECRET}
      MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_JWT_SECRET}
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins *
        anonymous

volumes:
  db_data:
  ollama_data:
